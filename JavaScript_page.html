<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Interactive Website</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            color: #333;
            line-height: 1.6;
        }

        nav {
            background: #111827;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
        }

        nav h2 {
            color: white;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 20px;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        nav ul li a:hover {
            color: #38bdf8;
        }

        .hero {
            height: 90vh;
            background: linear-gradient(to right, #2563eb, #38bdf8);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            padding: 20px;
        }

        .hero-content h1 {
            font-size: 55px;
            margin-bottom: 20px;
        }

        .hero-content p {
            font-size: 20px;
            margin-bottom: 25px;
        }

        .hero-content button {
            padding: 12px 25px;
            border: none;
            background: white;
            color: #2563eb;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .hero-content button:hover {
            background: #e2e8f0;
        }

        section {
            padding: 60px 10%;
        }

        section h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 36px;
        }

        .carousel {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        .carousel img {
            width: 100%;
            max-width: 700px;
            height: 400px;
            object-fit: cover;
            border-radius: 10px;
        }

        .carousel-buttons button {
            margin: 15px 10px;
            padding: 10px 20px;
            border: none;
            background: #2563eb;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .carousel-buttons button:hover {
            background: #1d4ed8;
        }

        .api-box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        .api-box button {
            padding: 12px 20px;
            border: none;
            background: #111827;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .api-box button:hover {
            background: #374151;
        }

        #joke {
            margin-top: 20px;
            font-size: 18px;
        }

        footer {
            background: #111827;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }


        @media(max-width: 768px) {

            nav {
                flex-direction: column;
                gap: 10px;
            }

            .hero-content h1 {
                font-size: 38px;
            }

            .hero-content p {
                font-size: 18px;
            }

            .carousel img {
                height: 250px;
            }
        }

        @media(max-width: 480px) {

            nav ul {
                flex-direction: column;
                text-align: center;
            }

            .hero-content h1 {
                font-size: 30px;
            }

            .hero-content p {
                font-size: 16px;
            }

            .carousel img {
                height: 200px;
            }

            .carousel-buttons button,
            .api-box button {
                width: 100%;
                margin-top: 10px;
            }
        }

    </style>
</head>

<body>

    <nav>
        <h2>MyWebsite</h2>

        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#gallery">Gallery</a></li>
            <li><a href="#api">API Data</a></li>
        </ul>
    </nav>

    <section class="hero" id="home">

        <div class="hero-content">

            <h1>Interactive Responsive Web Application</h1>

            <p>
                Responsive Web Design with Interactive Features
            </p>

            <button onclick="showWelcome()">
                Explore Website
            </button>

        </div>

    </section>

    <section id="gallery">

        <h2>Image Carousel</h2>

        <div class="carousel">

            <img id="carouselImage"
                 src="https://picsum.photos/id/1015/700/400"
                 alt="Image">

            <div class="carousel-buttons">

                <button onclick="previousImage()">
                    Previous
                </button>

                <button onclick="nextImage()">
                    Next
                </button>

            </div>

        </div>

    </section>

    <section id="api">

        <h2>Fetch Data from API</h2>

        <div class="api-box">

            <button onclick="getJoke()">
                Get Random Joke
            </button>

            <p id="joke">
                Click the button to load a joke.
            </p>

        </div>

    </section>

    <footer>
        <p>© 2026 Advanced Web Development Project</p>
    </footer>

    <script>

        function showWelcome() {
            alert("Welcome to the Interactive Website!");
        }


        const images = [
            "https://picsum.photos/id/1015/700/400",
            "https://picsum.photos/id/1016/700/400",
            "https://picsum.photos/id/1025/700/400"
        ];

        let currentImage = 0;

        function showImage() {
            document.getElementById("carouselImage").src =
                images[currentImage];
        }

        function nextImage() {

            currentImage++;

            if(currentImage >= images.length) {
                currentImage = 0;
            }

            showImage();
        }

        function previousImage() {

            currentImage--;

            if(currentImage < 0) {
                currentImage = images.length - 1;
            }

            showImage();
        }


        async function getJoke() {

            try {

                const response = await fetch(
                    "https://official-joke-api.appspot.com/random_joke"
                );

                const data = await response.json();

                document.getElementById("joke").innerHTML =
                    data.setup + "<br><br>" + data.punchline;
            }

            catch(error) {

                document.getElementById("joke").innerHTML =
                    "Failed to fetch joke.";
            }
        }

    </script>

</body>
</html>
